version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - uninotes-network

  backend:
    build: ./backend
    container_name: uninotes-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/uninotes
      - APP_UPLOAD_DIR=/app/uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - uninotes-network

  nginx:
    build: ./frontend
    container_name: uninotes-nginx
    ports:
      - "80:80"
    volumes:
      - uploads-data:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    networks:
      - uninotes-network

volumes:
  mongo-data:
  uploads-data:

networks:
  uninotes-network:
    driver: bridge
